services:
  birthday-reminder:
    build: .
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      TZ: "Europe/Zurich"
      # ── MiData ────────────────────────────────────────────────────
      MIDATA_TOKEN: "dein-api-token-hier"
      MIDATA_BASE_URL: "https://db.scout.ch"
      GROUP_ID: "123"
      FILTER_ID: "456"
      REMINDER_DAYS: "7,1"
      # ── SMTP ──────────────────────────────────────────────────────
      SMTP_HOST: "example-domain.mail.protection.outlook.com"
      SMTP_PORT: "25"
      MAIL_FROM: "noreply@example.com"
      MAIL_TO: "empfaenger@example.com"
      # ── Sonstiges ────────────────────────────────────────────────
      STATE_FILE: "/app/data/reminder_state.json"
    volumes:
      - reminder-data:/app/data
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 60s
      timeout: 10s
      start_period: 10s
      retries: 3

volumes:
  reminder-data:
