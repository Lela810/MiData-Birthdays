services:
  birthday-reminder:
    build: .
    restart: unless-stopped
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      TZ: "Europe/Zurich"
      STATE_FILE: "/app/data/reminder_state.json"
    volumes:
      - reminder-data:/app/data
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 60s
      timeout: 10s
      start_period: 10s
      retries: 3

volumes:
  reminder-data:
